name: daily-digest

on:
  schedule:
    - cron: '20 22 * * *'  # 22:20 UTC = 北京时间次日早 6:20；避开整点高峰，留出排队余量
    - cron: '30 0 13 7 *'  # 临时验证用：仅 7 月 13 日 00:30 UTC（北京 8:30）触发一次，验证后删除
  workflow_dispatch:        # 手动触发，方便随时补跑

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build digest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python -m ai_daily.main

      - name: Commit digest data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "digest: $(TZ=Asia/Shanghai date +%F)" || echo "nothing to commit"
          git push

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
